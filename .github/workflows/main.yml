name: Build Breach VR APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1" "platforms;android-34" "build-tools;34.0.0"

      - name: Download Gradle 8.9
        run: |
          set -eux
          curl -fL -o gradle.zip https://services.gradle.org/distributions/gradle-8.9-bin.zip
          unzip -q gradle.zip -d "$HOME/gradle-dist"
          echo "$HOME/gradle-dist/gradle-8.9/bin" >> "$GITHUB_PATH"

      - name: Show Gradle version
        run: gradle --version

      - name: Generate Gradle wrapper
        run: |
          set -eux
          gradle wrapper --gradle-version 8.9
          chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: breach-vr-debug-apk
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
